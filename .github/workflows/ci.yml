name: CI - Build and Test

permissions:
  contents: read

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and validate test suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        # Dedicated PostgreSQL service used by tests running with the "test" profile.
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: radiology_registry_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d radiology_registry_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java 21 (Temurin) with Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven


      - name: Resolve build metadata
        id: metadata
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-8)"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          APP_VERSION="$(python3 - <<'PY'
          import xml.etree.ElementTree as ET

          root = ET.parse('pom.xml').getroot()
          ns = {'m': 'http://maven.apache.org/POM/4.0.0'}
          version = root.find('m:version', ns)
          if version is None or not version.text:
              raise SystemExit('Unable to resolve <version> from pom.xml')
          print(version.text.strip())
          PY
          )"
          NORMALIZED_VERSION="${APP_VERSION%-SNAPSHOT}"

          mkdir -p target/ci
          CHANGELOG_FILE="target/ci/changelog-brief.md"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git --no-pager log --pretty=format:'- %h %s (%an)' "${{ github.event.before }}..${GITHUB_SHA}" > "${CHANGELOG_FILE}" || true
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            git --no-pager log --pretty=format:'- %h %s (%an)' "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" > "${CHANGELOG_FILE}" || true
          fi

          if [[ ! -s "${CHANGELOG_FILE}" ]]; then
            git --no-pager log -n 5 --pretty=format:'- %h %s (%an)' > "${CHANGELOG_FILE}"
          fi

          cat > target/ci/build-metadata.json <<EOF
          {
            "branch": "${BRANCH_NAME}",
            "commit": "${GITHUB_SHA}",
            "shortSha": "${SHORT_SHA}",
            "version": "${APP_VERSION}",
            "normalizedVersion": "${NORMALIZED_VERSION}",
            "runUrl": "${RUN_URL}",
            "event": "${GITHUB_EVENT_NAME}"
          }
          EOF

          echo "branch_name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "normalized_version=${NORMALIZED_VERSION}" >> "$GITHUB_OUTPUT"
          echo "run_url=${RUN_URL}" >> "$GITHUB_OUTPUT"

      - name: Wait for PostgreSQL readiness
        shell: bash
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d radiology_registry_test && exit 0
            echo "PostgreSQL not ready yet..."
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Run test suite (unit, slice, integration) with test profile
        env:
          SPRING_PROFILES_ACTIVE: test
          TEST_DB_URL: jdbc:postgresql://localhost:5432/radiology_registry_test
          TEST_DB_USERNAME: postgres
          TEST_DB_PASSWORD: postgres
        shell: bash
        run: |
          chmod +x ./mvnw
          set -o pipefail
          ./mvnw -B test | tee target/maven-test-output.log

      - name: Publish detailed test outcomes
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          report_files = sorted(glob.glob('target/surefire-reports/TEST-*.xml'))
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY')

          if not report_files:
              message = 'No Surefire XML reports found in target/surefire-reports.'
              print(message)
              if summary_path:
                  with open(summary_path, 'a', encoding='utf-8') as f:
                      f.write('## Test execution summary\\n\\n')
                      f.write(f'- {message}\\n')
              raise SystemExit(0)

          rows = []
          total_tests = total_failures = total_errors = total_skipped = 0

          for path in report_files:
              root = ET.parse(path).getroot()
              suite_name = root.attrib.get('name', os.path.basename(path))
              tests = int(root.attrib.get('tests', '0'))
              failures = int(root.attrib.get('failures', '0'))
              errors = int(root.attrib.get('errors', '0'))
              skipped = int(root.attrib.get('skipped', '0'))
              passed = tests - failures - errors - skipped
              status = 'PASSED' if failures == 0 and errors == 0 else 'FAILED'

              total_tests += tests
              total_failures += failures
              total_errors += errors
              total_skipped += skipped
              rows.append((suite_name, status, tests, passed, failures, errors, skipped))

          print('--- Test outcomes by class ---')
          for row in rows:
              print(f'{row[0]} -> {row[1]} (tests={row[2]}, passed={row[3]}, failures={row[4]}, errors={row[5]}, skipped={row[6]})')

          if summary_path:
              with open(summary_path, 'a', encoding='utf-8') as f:
                  f.write('## Test execution summary\\n\\n')
                  f.write('| Test class | Outcome | Tests | Passed | Failures | Errors | Skipped |\\n')
                  f.write('|---|---:|---:|---:|---:|---:|---:|\\n')
                  for suite_name, status, tests, passed, failures, errors, skipped in rows:
                      f.write(f'| `{suite_name}` | **{status}** | {tests} | {passed} | {failures} | {errors} | {skipped} |\\n')
                  overall = 'PASSED' if (total_failures + total_errors) == 0 else 'FAILED'
                  f.write('\\n')
                  f.write(f'- Overall outcome: **{overall}**\\n')
                  f.write(f'- Totals: tests={total_tests}, failures={total_failures}, errors={total_errors}, skipped={total_skipped}\\n')
          PY

      - name: Package application artifact
        if: success()
        shell: bash
        run: ./mvnw -B -DskipTests package

      - name: Upload CI artifacts (JUnit, logs, jar, metadata)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-${{ github.run_id }}
          path: |
            target/surefire-reports/**
            target/maven-test-output.log
            target/*.jar
            target/ci/build-metadata.json
            target/ci/changelog-brief.md
          if-no-files-found: warn

      - name: Publish build observability summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Build observability"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Short SHA: \`${{ steps.metadata.outputs.short_sha }}\`"
            echo "- Branch: \`${{ steps.metadata.outputs.branch_name }}\`"
            echo "- Event: \`${GITHUB_EVENT_NAME}\`"
            echo "- pom.xml version: \`${{ steps.metadata.outputs.app_version }}\`"
            echo "- Normalized version: \`${{ steps.metadata.outputs.normalized_version }}\`"
            echo "- Run link: [Open CI run](${{ steps.metadata.outputs.run_url }})"
            echo
            echo "### Brief changelog"
            cat target/ci/changelog-brief.md
          } >> "$GITHUB_STEP_SUMMARY"
