spring:
  application:
    name: radiology-registry
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/radiology_registry_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true


server:
  port: 8080